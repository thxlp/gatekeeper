# 1. HTTP — ACME + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name gatekeeper.studiodup.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS — full stack (UI + v1 deploy + v2 plugins)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name gatekeeper.studiodup.com;

    ssl_certificate     /etc/letsencrypt/live/gatekeeper.studiodup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gatekeeper.studiodup.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    client_max_body_size 60m;

    # 🌟 บรรทัดสำคัญ: บอกให้ Nginx ค้นหาโฮสต์ใน Docker Network แบบ Dynamic
    resolver 127.0.0.11 valid=30s;

    # v0.1 Node.js — deploy pipeline
    location /api/v1/ {
        rewrite ^/api/v1/(.*)$ /$1 break;
        proxy_pass http://gatekeeper:8088; # ชี้ไปที่ชื่อ Service 'gatekeeper' ในคอมโพสตัวนี้
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # v0.2 NestJS — plugins + audit
    location /api/v2/ {
        rewrite ^/api/v2/(.*)$ /$1 break;
        
        # 🌟 ปรับให้เป็นตัวแปร เพื่อหลบไม่ให้ Nginx บังคับตรวจเช็กโฮสต์ตอนเปิดเครื่อง
        set $upstream_v2 http://gatekeeper-v2:8089;
        proxy_pass $upstream_v2;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js UI
    location / {
        # 🌟 ปรับให้เป็นตัวแปรเช่นกันครับ
        set $upstream_frontend http://frontend:3000;
        proxy_pass $upstream_frontend;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
