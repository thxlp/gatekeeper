# Upstream pool สำหรับ backend v2 — load balance แบบ round-robin ระหว่าง 2 instance
upstream backend_pool {
    server backend-1:8089 max_fails=3 fail_timeout=15s;
    server backend-2:8089 max_fails=3 fail_timeout=15s;
}

map $http_cookie $has_challenge_cookie {
    default 0;
    "~*gk_challenge=" 1;
}

limit_req_zone $binary_remote_addr zone=gk_req_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=gk_conn_limit:10m;

# 1. HTTP — ACME + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name gatekeeper.studiodup.com;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS — full stack (UI + v1 deploy + v2 plugins)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name gatekeeper.studiodup.com;
    ssl_certificate     /etc/letsencrypt/live/gatekeeper.studiodup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gatekeeper.studiodup.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    client_max_body_size 60m;
    resolver 127.0.0.11 valid=30s;

    # Internal cookie check subrequest — ไม่ใส่ limit_req เพื่อไม่ให้ auth subrequest นับซ้ำ
    location /_auth_check {
        internal;
        if ($has_challenge_cookie = 0) {
            return 403;
        }
        return 204;
    }

    # Named location สำหรับ redirect ไป challenge (ใช้โดย error_page 403)
    location @require_challenge {
        return 307 /challenge?redirect=$request_uri;
    }

    location /challenge {
        limit_req zone=gk_req_limit burst=20 nodelay;
        limit_conn gk_conn_limit 20;
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # v0.1 Node.js — deploy pipeline
    location /api/v1/ {
        limit_req zone=gk_req_limit burst=20 nodelay;
        limit_conn gk_conn_limit 20;
        auth_request /_auth_check;
        error_page 403 = @require_challenge;
        rewrite ^/api/v1/(.*)$ /$1 break;
        proxy_pass http://gatekeeper:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # v0.2 NestJS — plugins + audit (load balanced 2 instances)
    location /api/v2/ {
        limit_req zone=gk_req_limit burst=20 nodelay;
        limit_conn gk_conn_limit 20;
        auth_request /_auth_check;
        error_page 403 = @require_challenge;
        rewrite ^/api/v2/(.*)$ /$1 break;
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js UI
    location / {
        limit_req zone=gk_req_limit burst=20 nodelay;
        limit_conn gk_conn_limit 20;
        auth_request /_auth_check;
        error_page 403 = @require_challenge;
        set $upstream_frontend http://frontend:3000;
        proxy_pass $upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
