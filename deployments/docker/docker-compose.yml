# Full stack: gatekeeper (v1) + backend (v2 NestJS, 2 instances load-balanced) + frontend (Next.js) + nginx
# หมายเหตุ: นี่คือ docker-compose.yml ตัวจริงที่ใช้งาน (ไม่มีไฟล์แยกที่ repo root)
services:
  gatekeeper:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: gatekeeper
    restart: unless-stopped
    environment:
      - PORT=8088
      - GATEKEEPER_TICKET_SECRET=${GATEKEEPER_TICKET_SECRET:?ต้องตั้งค่าใน .env ก่อน}
    volumes:
      - gatekeeper-data:/app/data
    expose:
      - "8088"
    mem_limit: 220m
  backend-1:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: backend-1
    restart: unless-stopped
    environment:
      - PORT=8089
      - NODE_ENV=production
      - COOKIE_CHALLENGE_SECRET=${COOKIE_CHALLENGE_SECRET:?ต้องตั้งค่าใน .env ก่อน}
    volumes:
      - backend-data:/app/data
    expose:
      - "8089"
    depends_on:
      - gatekeeper
    mem_limit: 150m
  backend-2:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: backend-2
    restart: unless-stopped
    environment:
      - PORT=8089
      - NODE_ENV=production
      - COOKIE_CHALLENGE_SECRET=${COOKIE_CHALLENGE_SECRET:?ต้องตั้งค่าใน .env ก่อน}
    volumes:
      - backend-data:/app/data
    expose:
      - "8089"
    depends_on:
      - gatekeeper
    mem_limit: 150m
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile # หรือตามชื่อ Dockerfile ของฝั่ง frontend คุณ
    container_name: frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    depends_on:
      - gatekeeper
      - backend-1
      - backend-2
    mem_limit: 220m
  nginx:
    image: nginx:alpine
    container_name: gatekeeper-proxy
    restart: unless-stopped
    depends_on:
      - gatekeeper
      - backend-1
      - backend-2
      - frontend
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ../nginx/gatekeeper.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
volumes:
  gatekeeper-data:
  backend-data:
