# Legacy: v0.1-only stack (gatekeeper + nginx)
# สำหรับ full stack (v1 + v2 + frontend) ใช้ docker-compose.yml ที่ repo root แทน
services:
  gatekeeper:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    container_name: gatekeeper
    restart: unless-stopped
    environment:
      - PORT=8088
      - GATEKEEPER_TICKET_SECRET=${GATEKEEPER_TICKET_SECRET:?ต้องตั้งค่าใน .env ก่อน}
    volumes:
      - gatekeeper-data:/app/data
    expose:
      - "8088"

  nginx:
    image: nginx:alpine
    container_name: gatekeeper-proxy
    restart: unless-stopped
    depends_on:
      - gatekeeper
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ../nginx/gatekeeper.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro

# เพิ่มต่อท้ายในส่วนของ services:
  frontend:
     build:
       context: ../../frontend
       dockerfile: Dockerfile # หรือตามชื่อ Dockerfile ของฝั่ง frontend คุณ
     container_name: frontend
     restart: unless-stopped
     environment:
       - NODE_ENV=production
     expose:
       - "3000"
     depends_on:
       - gatekeeper
volumes:
  gatekeeper-data:
